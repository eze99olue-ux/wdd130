<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Contact White Water Rafting for trip reservations, adventure planning, questions, and customer support.">
    <meta name="author" content="Eze Oluebube">
    <title>Contact Us | White Water Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <div class="logo">
            <img src="images/z-splash.jpg" alt="Rafting Company Logo">
        </div>
        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>

        <section class="company-info">
            <h1>Contact White Water Rafting</h1>
            <p>100 Adventure Trail</p>
            <p>Yosemite Valley, California</p>
            <p>+1 (209) 555-1234</p>
            <p>info@whitewaterrafting.com</p>
        </section>

        <section class="contact-container">

            <div class="map">
                <iframe title="Company Location Map"
                  src="https://maps.google.com/maps?q=Yosemite%20National%20Park,%20California&amp;z=12&amp;output=embed"
                  width="100%" height="450" loading="lazy" allowfullscreen>
                </iframe>
            </div>

            <div class="contact-form">
                <form action="#" method="post">

                    <div class="form-item">
                        <label for="fullname">Name</label>
                        <input type="text" id="fullname" name="fullname" required>
                    </div>

                    <div class="form-item">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <fieldset>
                        <legend>Message Purpose</legend>
                        <input type="radio" id="general" name="purpose" value="general" required>
                        <label for="general">General Inquiry</label>
                        <input type="radio" id="reservation" name="purpose" value="reservation">
                        <label for="reservation">Reservation Question</label>
                        <input type="radio" id="suggestion" name="purpose" value="suggestion">
                        <label for="suggestion">Website Suggestion</label>
                    </fieldset>

                    <div class="form-item">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                    </div>

                    <div class="newsletter">
                        <input type="checkbox" id="newsletter" name="newsletter">
                        <label for="newsletter">
                            Please subscribe me to the monthly newsletter
                        </label>
                    </div>

                    <button type="submit">
                        Get in Touch!
                    </button>

                </form>
            </div>

        </section>

        <section class="employees">

            <h2>We Are Here to Serve You</h2>

            <figure>
                <img src="images/employee1.jpg" alt="River Guide">
                <figcaption>
                    Anderson<br>
                    Lead River Guide
                </figcaption>
            </figure>

            <figure>
                <img src="images/employee2.jpg" alt="Trip Coordinator">
                <figcaption>
                    Jenny<br>
                    Trip Coordinator
                </figcaption>
            </figure>

            <figure>
                <img src="images/employee3.jpg" alt="Safety Manager">
                <figcaption>
                    John<br>
                    Safety Manager
                </figcaption>
            </figure>

        </section>

    </main>


    <footer>
        <p>&copy; 2026 White Water Rafting | Eze Oluebube</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="Facebook Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.png" alt="Linkedin Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.png" alt="Instagram Icon">
            </a>
        </nav>
    </footer>
</body>


</html>
